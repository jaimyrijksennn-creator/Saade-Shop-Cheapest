<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Saade Shop™</title>
  <meta name="description" content="Login or create an account at Saade Shop™" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --primary-glow: rgba(124,58,237,0.4);
      --secondary: #4c1d95;
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #a1a1aa;
      --error: #f87171;
      --success: #4ade80;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .bg-glow {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.12;
      pointer-events: none;
    }
    .bg-glow-1 { top: -200px; left: -200px; background: var(--primary); }
    .bg-glow-2 { bottom: -200px; right: -200px; background: #fbbf24; }

    .card {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; text-decoration:none; }
    .logo-icon {
      width:44px; height:44px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:22px; color:white;
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .logo-text { font-size:22px; font-weight:800; }
    .logo-text span:first-child { color:white; }
    .logo-text span:last-child  { color: var(--primary); }

    .tabs {
      display:flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 32px;
    }
    .tab {
      flex:1; padding:10px; border:none;
      background:transparent; color: var(--muted);
      font-weight:600; font-size:14px; cursor:pointer;
      border-radius:10px; transition: all 0.2s;
    }
    .tab.active { background: var(--primary); color:white; box-shadow: 0 4px 12px var(--primary-glow); }

    .form { display:none; flex-direction:column; gap:16px; }
    .form.active { display:flex; }

    .field label {
      display:block; font-size:12px; font-weight:600;
      text-transform:uppercase; letter-spacing:1px;
      color: var(--muted); margin-bottom:8px;
    }
    .field input {
      width:100%; padding:14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius:12px; color:white;
      font-size:15px; outline:none;
      font-family:'Inter',sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }
    .field input::placeholder { color: var(--muted); }

    .btn-submit {
      padding:15px; background: linear-gradient(135deg, var(--primary), var(--secondary));
      border:none; border-radius:12px; color:white;
      font-size:16px; font-weight:700; cursor:pointer;
      transition: all 0.2s; margin-top:4px;
      box-shadow: 0 4px 20px var(--primary-glow);
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow: 0 8px 28px var(--primary-glow); }
    .btn-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .divider { text-align:center; color: var(--muted); font-size:13px; position:relative; }
    .divider::before, .divider::after {
      content:''; position:absolute; top:50%; width:38%;
      height:1px; background: var(--border);
    }
    .divider::before { left:0; }
    .divider::after  { right:0; }

    .back-link {
      text-align:center; color: var(--muted); font-size:14px;
    }
    .back-link a { color: var(--primary); text-decoration:none; font-weight:600; }

    .alert {
      padding:12px 16px; border-radius:10px;
      font-size:14px; font-weight:500; display:none;
    }
    .alert.error   { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color: var(--error); }
    .alert.success { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color: var(--success); }
    .alert.show { display:block; }

    .admin-link {
      display:block; text-align:center; margin-top:28px;
      color: var(--muted); font-size:13px; text-decoration:none;
      transition: color 0.2s;
    }
    .admin-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="card">
    <a href="/" class="logo">
      <div class="logo-icon">S</div>
      <div class="logo-text"><span>Saade</span><span>Shop</span><sup style="font-size:10px;color:#71717a;margin-left:2px;">™</sup></div>
    </a>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- LOGIN FORM -->
    <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
    </form>

    <!-- REGISTER FORM -->
    <form class="form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="field">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="YourName" required />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required />
      </div>
      <div class="field">
        <label>Roblox Username</label>
        <input type="text" id="regRoblox" placeholder="YourRobloxName" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 characters" minlength="6" required />
      </div>
      <button type="submit" class="btn-submit" id="registerBtn">Create Account</button>
    </form>

    <div class="back-link" style="margin-top:20px;">
      <a href="/">← Back to Shop</a>
    </div>

    <a href="/admin" class="admin-link">🔐 Admin Login</a>
  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('saade_token')) {
      window.location.href = '/';
    }

    function switchTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
      hideAlert();
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert ${type} show`;
    }

    function hideAlert() {
      document.getElementById('alertBox').className = 'alert';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      hideAlert();
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value.trim(),
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('saade_token', data.token);
          localStorage.setItem('saade_user', JSON.stringify(data.user));
          showAlert('✅ Welcome back, ' + data.user.username + '! Redirecting…', 'success');
          setTimeout(() => window.location.href = '/', 1200);
        } else {
          showAlert('❌ ' + data.error, 'error');
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      } catch {
        showAlert('⚠️ Server error. Please try again.', 'error');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      hideAlert();
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value.trim(),
            email: document.getElementById('regEmail').value.trim(),
            password: document.getElementById('regPassword').value,
            robloxUsername: document.getElementById('regRoblox').value.trim()
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('saade_token', data.token);
          localStorage.setItem('saade_user', JSON.stringify(data.user));
          showAlert('✅ Account created! Welcome, ' + data.user.username + '!', 'success');
          setTimeout(() => window.location.href = '/', 1200);
        } else {
          showAlert('❌ ' + data.error, 'error');
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      } catch {
        showAlert('⚠️ Server error. Please try again.', 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
